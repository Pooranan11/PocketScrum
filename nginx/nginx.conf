# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name pocketscrum.xyz;
    return 301 https://$host$request_uri;
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name pocketscrum.xyz;

    ssl_certificate     /etc/letsencrypt/live/pocketscrum.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pocketscrum.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── DNS Docker interne (résolution dynamique des upstreams) ────────────────
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ── Frontend static files ──────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Assets immutables (hash dans le nom de fichier par Vite)
    location ~* \.(js|css|woff2?)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── REST API ───────────────────────────────────────────────────────────────
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket ──────────────────────────────────────────────────────────────
    location /ws/ {
        set $backend http://backend:8000;
        proxy_pass             $backend;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # ── Health ─────────────────────────────────────────────────────────────────
    location ~ ^/health {
        set $backend http://backend:8000;
        proxy_pass         $backend;
        proxy_set_header   Host $host;
    }

    # ── Umami Analytics ────────────────────────────────────────────────────────
    location = /umami {
        return 301 /umami/;
    }

    location /umami/ {
        proxy_pass         http://umami:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

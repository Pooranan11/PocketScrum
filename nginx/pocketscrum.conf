server {
    listen 80;
    server_name pocketscrum.xyz www.pocketscrum.xyz;

    # Frontend React (fichiers statiques buildés)
    root /var/www/pocketscrum;
    index index.html;

    # React Router : toute URL inconnue → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API REST → backend FastAPI
    location /api {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # WebSocket → backend FastAPI
    location /ws {
        proxy_pass             http://127.0.0.1:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     1800s;   # 30 min (= timeout inactivité backend)
    }
}
